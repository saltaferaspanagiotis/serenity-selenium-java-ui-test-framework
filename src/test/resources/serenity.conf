environments{

    chrome {
        driver = chrome
      capabilities {
            browserName = "chrome"
        acceptInsecureCerts = true
            "goog:chromeOptions" {
                args = [
                "--start-maximized",
                "--disable-gpu",
                "--no-sandbox"
            ]
          prefs = {
                    download.default_directory = "${user.dir}/src/test/resources/testdata"
                    download.prompt_for_download = false
                    download.directory_upgrade = true
                    safebrowsing.enabled = true
                    safebrowsing.disable_download_protection = true
                }
            }
        }
    }

    firefox {
      driver = firefox
      capabilities {
        browserName = "firefox"
        pageLoadStrategy = "normal"
        acceptInsecureCerts = true
        unhandledPromptBehavior = "dismiss"
        strictFileInteractability = true
        "moz:firefoxOptions" {
          args = ["-start-maximized"]
          prefs = {
              "javascript.options.showInConsole" = false
              download.folderList = 2
              download.dir = "${user.dir}/src/test/resources/testdata"
              download.useDownloadDir = true
              helperApps.neverAsk.saveToDisk = "application/pdf;text/plain;application/text;text/xml;application/xml"
              pdfjs.disabled = true
          }
        }
      }
    }

    grid-firefox {
        driver = remote
        webdriver {
            remote {
                url = "http://localhost:4444/wd/hub"
                driver = firefox
            }
        }
        capabilities {
            browserName = "firefox"
            "se:downloadsEnabled" = true
            pageLoadStrategy = "normal"
            acceptInsecureCerts = true
            "moz:firefoxOptions" {
                args = ["-start-maximized"]
                prefs = {
                    javascript.options.showInConsole = false
                    download.folderList = 2
                    download.useDownloadDir = true
                    helperApps.neverAsk.saveToDisk = "application/pdf;text/plain;application/text;text/xml;application/xml"
                    pdfjs.disabled = true
                }
            }
        }
    }

    grid-chrome {
        driver = remote
        webdriver {
            remote {
                url = "http://localhost:4444/wd/hub"
                driver = chrome
            }
        }
        capabilities {
            browserName = "chrome"
            "se:downloadsEnabled" = true
            acceptInsecureCerts = true
            "goog:chromeOptions" {
                args = [
                    "--start-maximized",
                    "--disable-gpu",
                    "--no-sandbox"
                ]
                prefs = {
                    download.prompt_for_download = false
                    safebrowsing.enabled = true
                    safebrowsing.disable_download_protection = true
                }
            }
        }
    }
}