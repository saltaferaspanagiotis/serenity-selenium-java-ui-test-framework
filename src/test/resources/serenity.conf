environments{
    firefox {
      driver = firefox
      capabilities {
        browserName = "firefox"
        pageLoadStrategy = "normal"
        acceptInsecureCerts = true
        unhandledPromptBehavior = "dismiss"
        strictFileInteractability = true
        "moz:firefoxOptions" {
          args = ["-start-maximized"]
          prefs {
            javascript.options.showInConsole= false
            download.folderList=2
            download.dir = ${user.dir}/src/test/resources/testdata
            download.useDownloadDir = true
            helperApps.neverAsk.saveToDisk = "application/pdf;text/plain;application/text;text/xml;application/xml"
            pdfjs.disabled = true
          }
        }
      }
    }
    grid-firefox {
        webdriver {
            driver = remote
            remote {
                url="http://localhost:4444/wd/hub"
                driver=firefox
            }
            capabilities {
              browserName = "firefox"
              pageLoadStrategy = "normal"
              acceptInsecureCerts = true
              unhandledPromptBehavior = "dismiss"
              strictFileInteractability = true
              "moz:firefoxOptions" {
                    args = ["-start-maximized"]
                    prefs {
                        javascript.options.showInConsole= false
                          download.folderList=2
                          download.dir = ${user.dir}/src/test/resources/testdata
                          download.useDownloadDir = true
                          helperApps.neverAsk.saveToDisk = "application/pdf;text/plain;application/text;text/xml;application/xml"
                          pdfjs.disabled = true

                    }
                }
            }
        }
    }
    chrome {
      driver = chrome
      capabilities {
        browserName = "chrome"
        acceptInsecureCerts = true
        "goog:chromeOptions" {
          args = [
            "--start-maximized",
            "--disable-gpu",
            "--no-sandbox"
            ]
          prefs {
            download.default_directory = ${user.dir}/src/test/resources/testdata
            download.prompt_for_download = false
            download.directory_upgrade = true
            safebrowsing.enabled = true
            safebrowsing.disable_download_protection = true
          }
        }
      }
    }
    grid-chrome {
      webdriver {
          driver = remote
                  remote {
              url="http://localhost:4444/wd/hub"
                      driver=chrome
          }
          capabilities {
              browserName = "chrome"
              acceptInsecureCerts = true
              "goog:chromeOptions" {
                  args = [
                  "--start-maximized",
                  "--disable-gpu",
                  "--no-sandbox"
                  ]
                  prefs {
                      download.default_directory = ${user.dir}/src/test/resources/testdata
                      download.prompt_for_download = false
                      download.directory_upgrade = true
                      safebrowsing.enabled = true
                      safebrowsing.disable_download_protection = true
                  }
              }
          }
      }
    }
    headless-chrome {
      driver = chrome
      capabilities {
        browserName = "chrome"
        acceptInsecureCerts = true
        "goog:chromeOptions" {
          args = [
            "--start-maximized",
            "--disable-gpu",
            "--no-sandbox",
            "--headless=new"]
          prefs {
            download.default_directory = ${user.dir}/src/test/resources/testdata
            download.prompt_for_download = false
            download.directory_upgrade = true
            safebrowsing.enabled = true
            safebrowsing.disable_download_protection = true
          }
        }
      }
    }
    edge {
      driver = edge
      capabilities {
        browserName = "MicrosoftEdge"
        acceptInsecureCerts = true
        "ms:edgeOptions" {
            args = ["--start-maximized"]
            prefs {
                download.default_directory = ${user.dir}/src/test/resources/testdata
                download.prompt_for_download = false
            }
        }
      }
    }
    grid-edge {
      webdriver {
        driver = remote
                  remote {
                      url="http://localhost:4444/wd/hub"
                      driver=edge
        }
        capabilities {
            browserName = "MicrosoftEdge"
              acceptInsecureCerts = true
                "ms:edgeOptions" {
                  args = ["--start-maximized"]
                  prefs {
                    download.default_directory = ${user.dir}/src/test/resources/testdata
                    download.prompt_for_download = false
                  }
                }
        }
      }
    }
}